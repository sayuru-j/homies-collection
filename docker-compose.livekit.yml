# LiveKit SFU for HomieLog group calls.
# Usage: docker compose -f docker-compose.livekit.yml up -d
# Set LIVEKIT_URL=ws://YOUR_HOST:7880 (use wss:// behind HTTPS reverse proxy).

services:
  livekit:
    image: livekit/livekit-server:v1.8
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
